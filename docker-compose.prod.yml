services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vela
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vela_change_me}
      POSTGRES_DB: vela
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vela -d vela"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend.prod
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: production
      DEBUG: "false"
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY}
      DATABASE_URL: postgresql+psycopg2://vela:${POSTGRES_PASSWORD:-vela_change_me}@db:5432/vela
      CHROMA_PERSIST_DIR: /app/data/chroma
      CORS_ORIGINS: ${PUBLIC_URL:-http://localhost}
      FRONTEND_URL: ${PUBLIC_URL:-http://localhost}
      PUBLIC_API_URL: ${PUBLIC_URL:-http://localhost}/api/v1
      ALLOW_OPEN_REGISTRATION: ${ALLOW_OPEN_REGISTRATION:-false}
      ALLOW_PASSWORD_LOGIN: ${ALLOW_PASSWORD_LOGIN:-true}
      SSO_ENABLED: ${SSO_ENABLED:-false}
      SSO_PROVIDER_NAME: ${SSO_PROVIDER_NAME:-企业 SSO}
      SSO_ISSUER_URL: ${SSO_ISSUER_URL:-}
      SSO_CLIENT_ID: ${SSO_CLIENT_ID:-}
      SSO_CLIENT_SECRET: ${SSO_CLIENT_SECRET:-}
      SSO_REDIRECT_URI: ${SSO_REDIRECT_URI:-}
      SSO_DEFAULT_ROLE: ${SSO_DEFAULT_ROLE:-legal}
      EXPORT_TEMPLATE: ${EXPORT_TEMPLATE:-law_school}
      EXPORT_ORG_NAME: ${EXPORT_ORG_NAME:-Vela 出海法务台}
      EXPORT_ORG_DEPARTMENT: ${EXPORT_ORG_DEPARTMENT:-企业法务部}
      EXPORT_RECIPIENT_LABEL: ${EXPORT_RECIPIENT_LABEL:-企业管理层}
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      LLM_POLISH_ENABLED: ${LLM_POLISH_ENABLED:-false}
    volumes:
      - backend_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend.prod
      args:
        VITE_API_BASE_URL: /api/v1
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-8080}:80"

volumes:
  pgdata:
  backend_data:
